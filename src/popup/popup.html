<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Mesh</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Privacy Mesh</h1>
      <label class="toggle" aria-label="Enable Privacy Mesh">
        <input type="checkbox" id="enabled-toggle" />
        <span class="slider"></span>
      </label>
    </header>

    <section class="stats">
      <div class="stat">
        <span class="stat-value" id="prompts-processed">0</span>
        <span class="stat-label">Prompts processed</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="pii-caught">0</span>
        <span class="stat-label">PII items caught</span>
      </div>
    </section>

    <section class="actions">
      <button id="open-sidebar">Open Sidebar</button>
      <button id="open-diff" class="secondary">Last Diff</button>
    </section>

    <footer>
      <a href="#" id="open-settings">Settings</a>
      <span class="version">v0.1.0</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
